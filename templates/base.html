{{define "base"}}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 flex items-center gap-1 h-16">
            <span class="text-indigo-600 font-bold text-xl mr-6">💰 FinControl</span>
            <a href="/" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition">Dashboard</a>
            <a href="/receitas" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition">Receitas</a>
            <a href="/cartoes" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition">Cartões</a>
            <a href="/terceiros" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition">Terceiros</a>
            <a href="/despesas" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition">Despesas</a>
            <a href="/emprestimos" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition">Empréstimos</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        {{template "content" .}}
    </main>

</body>
</html>
{{end}}
