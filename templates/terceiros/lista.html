{{define "content"}}

<div class="flex items-center justify-between mb-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-800">Terceiros</h1>
        <p class="text-sm text-gray-500 mt-1">Pessoas que utilizam seu cartão</p>
    </div>
    <a href="/terceiros/novo"
       class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition shadow-sm">
        + Novo Terceiro
    </a>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
        <thead>
            <tr class="bg-gray-50 border-b border-gray-200 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                <th class="px-6 py-3">Nome</th>
                <th class="px-6 py-3 text-right">Limite Liberado</th>
                <th class="px-6 py-3">Observação</th>
                <th class="px-6 py-3 text-center">Ações</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {{range .Terceiros}}
            <tr class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 font-medium text-gray-800">{{.Nome}}</td>
                <td class="px-6 py-4 text-right font-semibold text-indigo-600">R$ {{printf "%.2f" .LimiteLiberado}}</td>
                <td class="px-6 py-4 text-gray-500">
                    {{if .Observacao}}{{.Observacao}}{{else}}<span class="text-gray-300">—</span>{{end}}
                </td>
                <td class="px-6 py-4 text-center">
                    <div class="flex items-center justify-center gap-2">
                        <a href="/terceiros/{{.ID}}/editar"
                           class="text-indigo-600 hover:text-indigo-800 font-medium transition">Editar</a>
                        <form method="post" action="/terceiros/{{.ID}}/deletar">
                            <button type="submit" onclick="return confirm('Confirmar exclusão?')"
                                    class="text-red-500 hover:text-red-700 font-medium transition">Excluir</button>
                        </form>
                    </div>
                </td>
            </tr>
            {{else}}
            <tr>
                <td colspan="4" class="px-6 py-10 text-center text-gray-400">
                    Nenhum terceiro cadastrado.
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>

{{end}}
