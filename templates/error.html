{{define "content"}}
<div class="max-w-lg mx-auto mt-16 text-center">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-10">
        <div class="text-red-400 text-6xl mb-4">⚠️</div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">{{.Titulo}}</h1>
        <p class="text-gray-500 mb-8">{{.Mensagem}}</p>
        <a href="{{.Voltar}}" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2 rounded-lg transition">
            Voltar
        </a>
    </div>
</div>
{{end}}
